<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>159915 期权多空评分</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', 'PingFang SC', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
.container { max-width: 900px; margin: 0 auto; }
.header { margin-bottom: 24px; }
.header h1 { color: #f0f6fc; font-size: 22px; font-weight: 600; }
.header .sub { color: #8b949e; font-size: 13px; margin-top: 4px; }
.stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.stat { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 18px; text-align: center; min-width: 100px; }
.stat .label { color: #8b949e; font-size: 11px; }
.stat .value { font-size: 20px; font-weight: 700; margin-top: 2px; }
.chart-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 18px; }
.chart-card h3 { color: #f0f6fc; font-size: 14px; margin-bottom: 10px; font-weight: 500; }
.chart-container { position: relative; height: 400px; }
.footer { margin-top: 32px; text-align: center; font-size: 12px; color: #484f58; border-top: 1px solid #21262d; padding-top: 16px; }

.bullish-color { color: #3fb950; }
.bearish-color { color: #f85149; }
.panic-color { color: #d29922; }
.neutral-color { color: #8b949e; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📊 159915 创业板ETF · 期权多空评分</h1>
    <div class="sub">基于15维度预警系统 · 每日自动更新</div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="chart-card">
    <h3>📈 多空评分 vs ETF 收盘价</h3>
    <div class="chart-container"><canvas id="mainChart"></canvas></div>
  </div>

  <div class="footer">
    数据来源: 159915期权预警系统 · <span id="updateTime"></span>
  </div>
</div>

<script>
(async function() {
  const res = await fetch('charts_data.json');
  const data = await res.json();
  const s = data.series;
  const m = data.metadata;

  const fmtDate = d => d.substring(4,6) + '/' + d.substring(6,8);
  const labels = s.dates.map(fmtDate);

  const dirClass = s.direction[s.direction.length - 1] === 'bearish' || s.direction[s.direction.length - 1] === 'strong_bearish' ? 'bearish-color' :
    s.direction[s.direction.length - 1] === 'bullish' || s.direction[s.direction.length - 1] === 'strong_bullish' ? 'bullish-color' :
    s.direction[s.direction.length - 1] === 'panic_dominant' ? 'panic-color' : 'neutral-color';

  const dirLabel = {
    strong_bullish: '强偏多', bullish: '偏多', none: '中性',
    bearish: '偏空', strong_bearish: '强偏空', panic_dominant: '恐慌主导'
  }[s.direction[s.direction.length - 1]];

  document.getElementById('stats').innerHTML = `
    <div class="stat">
      <div class="label">交易日数</div>
      <div class="value">${m.total_days}</div>
    </div>
    <div class="stat">
      <div class="label">最新方向</div>
      <div class="value ${dirClass}">${dirLabel}</div>
    </div>
    <div class="stat">
      <div class="label">多空评分</div>
      <div class="value">${s.score[s.score.length - 1].toFixed(1)}</div>
    </div>
    <div class="stat">
      <div class="label">当前ETF</div>
      <div class="value">${s.etf_close[s.etf_close.length - 1].toFixed(3)}</div>
    </div>
  `;

  const green = '#3fb950', red = '#f85149', blue = '#58a6ff', yellow = '#d29922';
  Chart.defaults.color = '#8b949e';
  Chart.defaults.borderColor = '#21262d';

  new Chart(document.getElementById('mainChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '多空评分',
        data: s.score,
        backgroundColor: s.score.map(v => v >= 0
          ? `rgba(63,185,80,${Math.min(Math.abs(v)/10, 0.8)})`
          : `rgba(248,81,73,${Math.min(Math.abs(v)/10, 0.8)})`),
        borderColor: s.score.map(v => v >= 0 ? green : red),
        borderWidth: 1,
        order: 2,
        yAxisID: 'y',
      }, {
        label: 'ETF 收盘价',
        data: s.etf_close.map(v => v === 0 ? null : v),
        type: 'line',
        borderColor: blue,
        backgroundColor: blue,
        pointBackgroundColor: s.direction.map(d =>
          d === 'bullish' || d === 'strong_bullish' ? green :
          d === 'bearish' || d === 'strong_bearish' ? red :
          d === 'panic_dominant' ? yellow : blue
        ),
        pointRadius: 5,
        pointHoverRadius: 8,
        tension: 0.3,
        order: 1,
        yAxisID: 'y1',
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top' },
        tooltip: {
          callbacks: {
            afterBody: function(ctx) {
              const i = ctx[0].dataIndex;
              const dl = {strong_bullish:'强偏多',bullish:'偏多',none:'中性',bearish:'偏空',strong_bearish:'强偏空',panic_dominant:'恐慌主导'};
              return `方向: ${dl[s.direction[i]] || s.direction[i]} | ${({high:"🟢高可信",medium:"🟡中可信",low:"🔴低可信"})[s.signal_confidence?.[i]||"low"]}`;
            }
          }
        }
      },
      scales: {
        y: {
          min: -10, max: 10,
          position: 'left',
          grid: { color: '#21262d' },
          ticks: { stepSize: 2 }
        },
        y1: {
          min: Math.min(...s.etf_close.filter(v => v > 0)) * 0.97 || 3.5,
          max: Math.max(...s.etf_close) * 1.03 || 4.2,
          position: 'right',
          grid: { display: false },
          ticks: { callback: v => v.toFixed(3) }
        }
      }
    }
  });

  document.getElementById('updateTime').textContent = '更新: ' + new Date().toLocaleString('zh-CN');
})();
</script>
</body>
</html>
