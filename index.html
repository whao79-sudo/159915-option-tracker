<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>159915 期权多空追踪</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', 'PingFang SC', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
.header { max-width: 1200px; margin: 0 auto 24px; }
.header h1 { color: #f0f6fc; font-size: 24px; font-weight: 600; }
.header .sub { color: #8b949e; font-size: 14px; margin-top: 4px; }
.stats-bar { max-width: 1200px; margin: 0 auto 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
.stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px; text-align: center; }
.stat-card .label { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .value { color: #f0f6fc; font-size: 22px; font-weight: 700; margin-top: 4px; }
.stat-card .sub-value { color: #8b949e; font-size: 12px; margin-top: 2px; }
.chart-grid { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
.chart-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 18px; }
.chart-card h3 { color: #f0f6fc; font-size: 14px; margin-bottom: 10px; font-weight: 500; }
.chart-container { position: relative; height: 280px; }
.direction-bullish { color: #3fb950; }
.direction-bearish { color: #f85149; }
.direction-panic { color: #d29922; }
.direction-none { color: #8b949e; }
.footer { max-width: 1200px; margin: 32px auto 0; text-align: center; font-size: 12px; color: #484f58; border-top: 1px solid #21262d; padding-top: 16px; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 159915 创业板ETF期权 · 多空追踪</h1>
  <div class="sub">基于15维度预警系统 · 每日自动更新</div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="chart-grid">
  <div class="chart-card">
    <h3>📈 多空评分 vs ETF收盘价</h3>
    <div class="chart-container"><canvas id="scoreChart"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>🔄 PCR结构（成交量/持仓量）</h3>
    <div class="chart-container"><canvas id="pcrChart"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>📦 净仓变动（CALL / PUT / 总量）</h3>
    <div class="chart-container"><canvas id="cangchaChart"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>🔴 模块信号计数（偏多 / 偏空 / 恐慌）</h3>
    <div class="chart-container"><canvas id="signalChart"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>📐 其他指标（GEX / 净Delta / IV/HV百分位）</h3>
    <div class="chart-container"><canvas id="extraChart"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>⚠️ P95+ 计数（PUT / CALL / 换手率）</h3>
    <div class="chart-container"><canvas id="alertChart"></canvas></div>
  </div>
</div>

<div class="footer">
  数据来源: 159915期权预警系统 · judgment_memory.json · <span id="updateTime"></span>
</div>

<script>
(async function() {
  const res = await fetch('charts_data.json');
  const data = await res.json();
  const s = data.series;
  const m = data.metadata;

  // 格式化日期
  const fmtDate = (d) => {
    if (d.length === 8) return d.substring(4,6) + '/' + d.substring(6,8);
    return d.substring(2);
  };
  const labels = s.dates.map(fmtDate);
  const fullLabels = s.dates.map(d => d.substring(0,4) + '/' + d.substring(4,6) + '/' + d.substring(6,8));

  // 统计栏
  const latestDir = s.direction_label[s.direction_label.length - 1];
  const dirClass = s.direction[s.direction.length - 1] === 'bearish' || s.direction[s.direction.length - 1] === 'strong_bearish' ? 'direction-bearish' :
    s.direction[s.direction.length - 1] === 'bullish' || s.direction[s.direction.length - 1] === 'strong_bullish' ? 'direction-bullish' :
    s.direction[s.direction.length - 1] === 'panic_dominant' ? 'direction-panic' : 'direction-none';

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card">
      <div class="label">交易日数</div>
      <div class="value">${m.total_days}</div>
    </div>
    <div class="stat-card">
      <div class="label">最新方向</div>
      <div class="value ${dirClass}">${latestDir}</div>
    </div>
    <div class="stat-card">
      <div class="label">多空评分</div>
      <div class="value">${s.score[s.score.length - 1].toFixed(1)}</div>
      <div class="sub-value">-10 ~ +10</div>
    </div>
    <div class="stat-card">
      <div class="label">最新PCR(量/仓)</div>
      <div class="value">${s.vol_pcr[s.vol_pcr.length - 1].toFixed(2)} / ${s.oi_pcr[s.oi_pcr.length - 1].toFixed(2)}</div>
    </div>
    <div class="stat-card">
      <div class="label">成交PCR百分位</div>
      <div class="value">${m.latest_iv_hv_pct || '-'}</div>
    </div>
  `;

  // 颜色
  const green = '#3fb950';
  const red = '#f85149';
  const yellow = '#d29922';
  const blue = '#58a6ff';
  const purple = '#bc8cff';
  const cyan = '#39d2c0';

  Chart.defaults.color = '#8b949e';
  Chart.defaults.borderColor = '#21262d';
  Chart.defaults.font.family = '-apple-system, "Segoe UI", "PingFang SC", sans-serif';

  // 1. 多空评分 vs ETF
  new Chart(document.getElementById('scoreChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '多空评分 (-10~+10)',
        data: s.score,
        backgroundColor: s.score.map(v => v >= 0 ? `rgba(63,185,80,${Math.min(Math.abs(v)/10, 0.8)})` : `rgba(248,81,73,${Math.min(Math.abs(v)/10, 0.8)})`),
        borderColor: s.score.map(v => v >= 0 ? green : red),
        borderWidth: 1,
        order: 2,
        yAxisID: 'y',
      }, {
        label: 'ETF 收盘价',
        data: s.etf_close.map(v => v === 0 ? null : v),
        type: 'line',
        borderColor: blue,
        backgroundColor: blue,
        pointBackgroundColor: s.direction.map(d =>
          d === 'bullish' || d === 'strong_bullish' ? green :
          d === 'bearish' || d === 'strong_bearish' ? red :
          d === 'panic_dominant' ? yellow : blue
        ),
        pointRadius: 5,
        pointHoverRadius: 8,
        tension: 0.3,
        order: 1,
        yAxisID: 'y1',
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        tooltip: {
          callbacks: {
            afterBody: function(ctx) {
              const i = ctx[0].dataIndex;
              return `方向: ${s.direction_label[i]} | 偏多/偏空/恐慌: ${s.bullish[i]}/${s.bearish[i]}/${s.panic[i]}`;
            }
          }
        }
      },
      scales: {
        y: {
          min: -10,
          max: 10,
          position: 'left',
          grid: { color: '#21262d' },
          ticks: { stepSize: 2 }
        },
        y1: {
          min: Math.min(...s.etf_close.filter(v => v > 0)) * 0.97 || 3.5,
          max: Math.max(...s.etf_close) * 1.03 || 4.2,
          position: 'right',
          grid: { display: false },
          ticks: { 
            callback: v => v.toFixed(3)
          }
        }
      }
    }
  });

  // 2. PCR
  new Chart(document.getElementById('pcrChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '成交量PCR', data: s.vol_pcr, borderColor: cyan, backgroundColor: cyan, tension: 0.3, pointRadius: 4 },
        { label: '持仓量PCR', data: s.oi_pcr, borderColor: purple, backgroundColor: purple, tension: 0.3, pointRadius: 4 },
        { label: '双PCR分裂%', data: s.split_pct, borderColor: yellow, backgroundColor: yellow, tension: 0.3, pointRadius: 4, yAxisID: 'y1', borderDash: [4, 4] },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { tooltip: { callbacks: { afterBody: ctx => {
        const i = ctx[0].dataIndex;
        return `ETF: ${s.etf_close[i]}`;
      }}}},
      scales: {
        y: { position: 'left', grid: { color: '#21262d' } },
        y1: { position: 'right', grid: { display: false }, ticks: { callback: v => v + '%' } }
      }
    }
  });

  // 3. 仓差
  new Chart(document.getElementById('cangchaChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'CALL净增仓', data: s.call_cangcha, backgroundColor: 'rgba(63,185,80,0.6)', borderColor: green, borderWidth: 1 },
        { label: 'PUT净增仓', data: s.put_cangcha, backgroundColor: 'rgba(248,81,73,0.6)', borderColor: red, borderWidth: 1 },
        { label: '净总量', data: s.total_cangcha, type: 'line', borderColor: blue, backgroundColor: blue, tension: 0.3, pointRadius: 3 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: { y: { position: 'left', grid: { color: '#21262d' } } }
    }
  });

  // 4. 信号计数
  new Chart(document.getElementById('signalChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '偏多信号', data: s.bullish, backgroundColor: 'rgba(63,185,80,0.5)', borderColor: green, borderWidth: 1 },
        { label: '偏空信号', data: s.bearish, backgroundColor: 'rgba(248,81,73,0.5)', borderColor: red, borderWidth: 1 },
        { label: '恐慌信号', data: s.panic, backgroundColor: 'rgba(210,153,34,0.5)', borderColor: yellow, borderWidth: 1 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { y: { beginAtZero: true, grid: { color: '#21262d' } } }
    }
  });

  // 5. 其他指标
  new Chart(document.getElementById('extraChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'GEX(亿)', data: s.gex_total.map(v => v / 1e8), borderColor: cyan, tension: 0.3 },
        { label: '净Delta(千)', data: s.net_delta.map(v => v / 1000), borderColor: purple, tension: 0.3 },
        { label: 'IV/HV百分位', data: s.iv_hv_pct, borderColor: yellow, tension: 0.3, borderDash: [4, 4] },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: { y: { position: 'left', grid: { color: '#21262d' } } }
    }
  });

  // 6. P95+ 计数
  new Chart(document.getElementById('alertChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'PUT P95+', data: s.put_p95_count, backgroundColor: 'rgba(248,81,73,0.6)', borderColor: red, borderWidth: 1 },
        { label: 'CALL P95+', data: s.call_p95_count, backgroundColor: 'rgba(63,185,80,0.6)', borderColor: green, borderWidth: 1 },
        { label: '换手率P95+', data: s.turnover_p95_count, backgroundColor: 'rgba(88,166,255,0.6)', borderColor: blue, borderWidth: 1 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { y: { beginAtZero: true, grid: { color: '#21262d' } } }
    }
  });

  document.getElementById('updateTime').textContent = '更新: ' + new Date().toLocaleString('zh-CN');
})();
</script>
</body>
</html>
