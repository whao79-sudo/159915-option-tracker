const keys = ['bull_call_over5','bull_call_under5','bear_call_over5','bear_call_under5','bear_put_over5','bear_put_under5'];
const labels = ['牛市追涨','牛市回调','熊市反弹CALL','熊市追跌CALL','熊市冲高做空','熊市顺势做空'];
const colors = ['#e03131','#f06595','#ff922b','#fab005','#20c997','#339af0'];

// 图例
document.getElementById('legend').innerHTML = keys.map((k,i)=>
  `<span class="lg-item" style="border-color:${colors[i]}">${'●'} ${labels[i]} (${raw[k].data.length})</span>`
).join('');

function td(s){return new Date(s.replace(/\//g,'-'))}

// 收集所有ETF数据用于画线
const etfData = [];
const allDates = new Set();
keys.forEach(k=>raw[k].data.forEach(d=>{allDates.add(d.d); etfData.push([td(d.d).getTime(), d.etf]);}));
const uniqueEtf = Array.from(new Map([...etfData].map(d=>[d[0],d])).values()).sort((a,b)=>a[0]-b[0]);

function getEftValue(t){
  // 找到最接近的ETF价格
  let best = null, bestDiff = Infinity;
  for(const d of uniqueEtf){
    const diff = Math.abs(d[0]-t);
    if(diff<bestDiff){bestDiff=diff;best=d[1];}
    if(diff>50000000) break;
  }
  return best||0;
}

const chart = echarts.init(document.getElementById('chart'));
chart.setOption({
  tooltip: {
    trigger:'axis', axisPointer:{type:'cross'},
    formatter: p=>{
      if(!p || !p.length) return '';
      if(p.length===1 && !p[0].seriesName.startsWith('●')){
        const d = new Date(p[0].data[0]);
        return `<b>${d.toLocaleDateString('zh-CN')}</b><br/>ETF: ${p[0].data[1].toFixed(3)}`;
      }
      let s = '';
      p.filter(i=>i.seriesName.startsWith('●')).forEach(i=>{
        const d = new Date(i.data[0]);
        s += `<b>${d.toLocaleDateString('zh-CN')}</b><br/>${i.seriesName}<br/>15日: <b>${i.data[2].toFixed(2)}%</b> | ETF: ${i.data[1].toFixed(3)}<br/>`;
      });
      return s;
    }
  },
  legend: {show: false},
  grid: {left:50, right:20, top:15, bottom:50},
  dataZoom: [
    {type:'inside', xAxisIndex:0, start:0, end:100},
    {type:'slider', xAxisIndex:0, start:0, end:100, bottom:5, height:25,
     borderColor:'#1a2a3a', backgroundColor:'#0d1720',
     fillerColor:'rgba(79,195,247,0.15)',
     textStyle:{color:'#708090', fontSize:10}}
  ],
  xAxis: {type:'time', axisLabel:{color:'#708090',fontSize:11},

  yAxis: {type:'value', name:'ETF价格', nameTextStyle:{color:'#708090'},

  series: [
    // ETF线
    {
      name: 'ETF价格',
      type: 'line',
      data: uniqueEtf,
      smooth: true,
      lineStyle: {width:1.5, color:'#2a9d8f'},
      showSymbol: false,
      areaStyle: {color: {type:'linear',x:0,y:0,x2:0,y2:1,
                   colorStops:[{offset:0,color:'#2a9d8f20'},{offset:1,color:'#2a9d8f02'}]}}
    },
    // 6组信号散点
    ...keys.map((k,i)=>{
      return {
        name: '● '+labels[i],
        type: 'scatter'

        data: raw[k].data.map(d=>[td(d.d).getTime(), d.etf, d.win15, d.cnt]),
        symbolSize: 12,
        itemStyle: {color: colors[i], borderColor: '#ffffff', borderWidth: 1}
      };
    })
  ]
});

// 统计信息
const statsHtml = keys.map((k,i)=>{
  const s = raw[k].stats;
  return `<div style="display:inline-block;margin:4px 12px 4px 0;border-left:3px solid ${colors[i]};padding-left:8px">
    <b style="color:${colors[i]}">${labels[i]}</b> ${s.count}次
    15日中位数<b>${(s.win15_med>0?'+':'')+s.win15_med}%</b>

  </div>`;
}).join('<br>');
