    '<div class="stat-card"><div class="val pos">+'+s.po.toFixed(0)+'%</div><div class="label">SH50正收益总额</div></div>' +
    '<div class="stat-card"><div class="val neg">'+s.ne.toFixed(0)+'%</div><div class="label">SH50负收益总额</div></div>' +
    '<div class="stat-card"><div class="val '+(s.med>0?'pos':'neg')+'">'+pct(s.med)+'</div><div class="label">SH50中位</div></div>' +
    '<div class="stat-card"><div class="val '+(h.med>0?'pos':'neg')+'">'+pct(h.med)+'</div><div class="label">HS300中位</div></div>' +
    '</div>';
})();

// ===== 信号明细表 =====
function buildTable(sigs, tableId, chartId, extraCol) {
  const c = echarts.init(document.getElementById(chartId));
  const barCls = sigs.map(s => s.avg_opt_ret > 0 ? '#3fb950' : '#f85149');
  
  c.setOption({
    backgroundColor: 'transparent',
    grid: [{left:'4%',right:'4%',bottom:'15%',top:'8%'}],
    tooltip: {
      formatter: function(ps) {
        if(!ps||!ps[0])return'';
        const s = sigs[ps[0].dataIndex];
        return '<b>'+s.date+'</b><br/>K1='+s.k1.toFixed(2)+': '+pct(s.opt_ret_k1)+'<br/>K2='+s.k2.toFixed(2)+': '+pct(s.opt_ret_k2)+'<br/>均收益: '+pct(s.avg_opt_ret)+'<br/>ETF 60d: '+pct(s.etf_60d);
      }
    },
    xAxis: {type:'category', data:sigs.map(s=>s.date), axisLabel:{color:'#8b949e',fontSize:10,rotate:45}, axisLine:{lineStyle:{color:'#30363d'}}},
    yAxis: {type:'value', axisLabel:{color:'#8b949e',fontSize:10}, splitLine:{lineStyle:{color:'#21262d',type:'dashed'}}},
    series: [{type:'bar', data:sigs.map(s=>s.avg_opt_ret), itemStyle:{color:function(p){return p.value>0?'#3fb950':'#f85149'},borderRadius:[2,2,0,0]}}]
  });
  window.addEventListener('resize', () => c.resize());
  
  // 表格
  const ext = extraCol ? '<th>SH50 J</th>' : '<th>HS300 J</th>';
  let t = '<thead><tr><th>#</th><th>日期</th><th>ETF</th><th>K1/K2</th><th>K1收益</th><th>K2收益</th><th>均收益</th><th>ETF 60d</th><th>CY J</th>'+ext+'</tr></thead><tbody>';
  
  sigs.forEach((s, i) => {
    const cls = Math.abs(s.avg_opt_ret) > 1000 ? 'megawin' : (s.avg_opt_ret > 0 ? 'win' : 'loss');
    const col = extraCol ? s.sh50_j.toFixed(1) : s.hs_j.toFixed(1);
    t += '<tr class="'+cls+'"><td>'+(i+1)+'</td><td>'+s.date+'</td><td class="num">'+s.etf.toFixed(3)+'</td>' +
      '<td class="num">'+s.k1.toFixed(2)+'/'+s.k2.toFixed(2)+'</td>' +
      '<td class="num">'+pct(s.opt_ret_k1)+'</td><td class="num">'+pct(s.opt_ret_k2)+'</td>' +
      '<td class="num" style="font-weight:bold;">'+pct(s.avg_opt_ret)+'</td>' +
      '<td class="num">'+pct(s.etf_60d)+'</td><td class="num">'+s.cy_j.toFixed(1)+'</td>' +
      '<td class="num">'+col+'</td></tr>';
  });
  t += '</tbody>';
  document.getElementById(tableId).innerHTML = t;
}

buildTable(hs, 'hsTable', 'hsBar', true);
buildTable(sh50, 'sh50Table', 'sh50Bar', false);
</script>
