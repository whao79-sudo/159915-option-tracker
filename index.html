<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>159915 模块指标 vs ETF走势</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,'Microsoft YaHei',sans-serif;padding:20px}
h1{text-align:center;font-size:20px;margin-bottom:20px;color:#eee}
.container{max-width:1200px;margin:0 auto}
.chart-box{background:#16213e;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.chart-box h2{font-size:14px;color:#888;margin-bottom:8px;font-weight:400}
.chart{width:100%;height:300px}
.info{background:#0f3460;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;line-height:1.6}
.info strong{color:#e94560}
</style>
</head><body>
<div class="container">
<h1>159915 四模块指标 vs ETF 收盘价 (92天)</h1>

<div class="info">
📌 <strong>N模块</strong> — IV/HV百分位 | <strong>J模块</strong> — GEX(万) 净偏度 | <strong>M模块</strong> — CALL/PUT净仓差 | <strong>I模块</strong> — PCR量/仓 + 分裂方向<br>
🟢 绿色线=ETF收盘价 | 其他颜色=各模块指标 | 竖线标注=模块极端值
</div>

<div id="chart-N" class="chart-box"><h2>📊 N模块: IV/HV百分位 vs ETF</h2><div id="c-N" class="chart"></div></div>
<div id="chart-J" class="chart-box"><h2>📊 J模块: GEX(万) 净偏度 vs ETF</h2><div id="c-J" class="chart"></div></div>
<div id="chart-M" class="chart-box"><h2>📊 M模块: CALL/PUT净仓差 vs ETF</h2><div id="c-M" class="chart"></div></div>
<div id="chart-I" class="chart-box"><h2>📊 I模块: PCR量/仓 + 分裂% vs ETF</h2><div id="c-I" class="chart"></div></div>

</div>
<script>
fetch('./module_series.json').then(r=>r.json()).then(d=>{
    const dates = d.dates;
    const etf = d.series.etf_close;
    
    // 翻译日期为MM/DD
    const labels = dates.map((v,i) => {
        if(i===0 || i===dates.length-1 || i%5===0 || v.endsWith('22')||v.endsWith('07')||v.endsWith('28')||v.endsWith('21')) return v.slice(0,2)+'/'+v.slice(2);
        return '';
    });

    // ETF归一化显示
    const etfMin = Math.min(...etf.filter(v=>v!==null));
    const etfMax = Math.max(...etf.filter(v=>v!==null));
    const etfRange = etfMax - etfMin;

    function makeChart(domId, seriesList, yName, opts={}) {
        const dom = document.getElementById(domId);
        const chart = echarts.init(dom);
        
        const series = [
            {
                name: 'ETF收盘',
                type: 'line',
                data: etf,
                yAxisIndex: 0,
                smooth: true,
                lineStyle: {width:2,color:'#4ade80'},
                itemStyle: {color:'#4ade80'},
                symbol: 'none',
                z: 10
            },
            ...seriesList
        ];
        
        const option = {
            tooltip: {
                trigger: 'axis',
                axisPointer: {type:'cross'},
                backgroundColor: 'rgba(22,33,62,0.9)',
                borderColor: '#333',
                textStyle: {color:'#eee',fontSize:12}
            },
            legend: {
                data: series.map(s=>s.name),
                bottom: 0,
                textStyle: {color:'#999',fontSize:11},
                icon: 'roundRect',
                itemWidth: 14,
                itemHeight: 8
            },
            grid: {left:50,right:20,top:10,bottom:40},
            xAxis: {
                type: 'category',
                data: labels,
                axisLabel: {color:'#666',fontSize:10,rotate:45},
                axisLine: {lineStyle:{color:'#333'}},
                splitLine: {show:false}
            },
            yAxis: [
                {
                    type: 'value',
                    name: 'ETF',
                    nameTextStyle: {color:'#4ade80',fontSize:10},
                    axisLabel: {color:'#4ade80',fontSize:10,formatter:v=>v.toFixed(2)},
                    splitLine: {lineStyle:{color:'#222',type:'dashed'}},
                    min: etfMin - etfRange*0.1,
                    max: etfMax + etfRange*0.1
                },
                {
                    type: 'value',
                    name: yName,
                    nameTextStyle: {color:'#e94560',fontSize:10},
                    axisLabel: {color:'#e94560',fontSize:10},
                    splitLine: {show:false}
                }
            ],
            series: series
        };
        
        if (opts.markLines) {
            option.series[0].markLine = opts.markLines;
        }
        
        chart.setOption(option);
        window.addEventListener('resize', ()=>chart.resize());
        return chart;
    }

    // --- N: IV/HV百分位 ---
    makeChart('c-N', [{
        name: 'IV/HV%',
        type: 'line',
        data: d.series.iv_hv_pct,
        yAxisIndex: 1,
        smooth: true,
        lineStyle: {width:2,color:'#f59e0b'},
        itemStyle: {color:'#f59e0b'},
        symbol: 'none',
        areaStyle: {color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(245,158,11,0.2)'},{offset:1,color:'rgba(245,158,11,0)'}]}}
    }], 'IV/HV%');

    // --- J: GEX 净偏度 ---
    const gex = d.series.gex_wan;
    const gexColors = gex.map(v => {
        if (v === null) return '#333';
        return v >= 40 ? '#ff6b6b' : v >= 25 ? '#f59e0b' : '#4ade80';
    });
    makeChart('c-J', [{
        name: 'GEX(万)',
        type: 'bar',
        data: gex,
        yAxisIndex: 1,
        itemStyle: {
            color: params => {
                const v = gex[params.dataIndex];
                if (v === null) return '#333';
                return v >= 40 ? '#ff6b6b' : v >= 25 ? '#f59e0b' : '#4ade80';
            },
            opacity: 0.7
        }
    }], 'GEX(万)');

    // --- M: CALL/PUT 仓差 ---
    const callC = d.series.call_cangcha;
    const putC = d.series.put_cangcha;
    makeChart('c-M', [
        {
            name: 'CALL仓差',
            type: 'bar',
            data: callC,
            yAxisIndex: 1,
            itemStyle: {color:'rgba(34,197,94,0.6)'}
        },
        {
            name: 'PUT仓差',
            type: 'bar',
            data: putC,
            yAxisIndex: 1,
            itemStyle: {color:'rgba(239,68,68,0.6)'}
        }
    ], '净仓差');

    // --- I: PCR + 分裂 ---
    const split = d.series.split_pct;
    const splitColors = split.map(v => {
        if (v === null) return '#666';
        return v > 0 ? '#22d3ee' : '#fb7185';
    });
    makeChart('c-I', [
        {
            name: 'PCR量',
            type: 'line',
            data: d.series.vol_pcr,
            yAxisIndex: 1,
            smooth: true,
            lineStyle: {width:1.5,color:'#a78bfa',type:'dashed'},
            itemStyle: {color:'#a78bfa'},
            symbol: 'none'
        },
        {
            name: 'PCR仓',
            type: 'line',
            data: d.series.oi_pcr,
            yAxisIndex: 1,
            smooth: true,
            lineStyle: {width:1.5,color:'#f472b6',type:'dashed'},
            itemStyle: {color:'#f472b6'},
            symbol: 'none'
        },
        {
            name: '分裂%',
            type: 'bar',
            data: split,
            yAxisIndex: 1,
            itemStyle: {
                color: params => splitColors[params.dataIndex],
                opacity: 0.5
            }
        }
    ], 'PCR/分裂%');

}).catch(e => {
    document.body.innerHTML = '<p style="color:red">加载数据失败: '+e.message+'</p>';
    console.error(e);
});
</script>
</body></html>
