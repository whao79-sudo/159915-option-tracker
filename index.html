<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>N模块 · 3年 IV/HV比率 vs ETF</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,'Microsoft YaHei',sans-serif;padding:20px}
h1{text-align:center;font-size:18px;margin:0 0 4px 0;color:#eee}
.sub{text-align:center;font-size:12px;color:#666;margin-bottom:16px}
.container{max-width:1300px;margin:0 auto}
.chart-box{background:#16213e;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.chart{width:100%;height:400px}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.stat-card{flex:1;min-width:100px;background:#16213e;border-radius:8px;padding:8px 12px;text-align:center}
.stat-card .num{font-size:20px;font-weight:700;color:#e94560}
.stat-card .num.green{color:#4ade80}
.stat-card .num.yellow{color:#facc15}
.stat-card .num.blue{color:#38bdf8}
.stat-card .label{font-size:11px;color:#888;margin-top:2px}
.info-box{background:#0f3460;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;line-height:1.7;color:#aaa}
.info-box strong{color:#e94560}
.info-box .green{color:#4ade80}
</style>
</head><body>
<div class="container">
<h1>N模块 · IV/HV比率 vs ETF收盘价（3年）</h1>
<div class="sub">数据源: IVFS 平值CALL合约±5% | 159915 ETF日线 | 882个交易日 (2022/09~2026/05)</div>

<div class="stats">
<div class="stat-card"><div class="num blue" id="days">...</div><div class="label">交易日</div></div>
<div class="stat-card"><div class="num yellow" id="cur-ratio">...</div><div class="label">最新IV/HV比</div></div>
<div class="stat-card"><div class="num" id="iv-range">...</div><div class="label">IV范围</div></div>
<div class="stat-card"><div class="num green" id="cur-etf">...</div><div class="label">最新ETF</div></div>
</div>

<div class="info-box">
📌 <strong>上区</strong>: ETF收盘(绿线) + IV/HV比(橙线) + 滚动百分位着色<br>
📌 <strong>下区</strong>: IV(红线) + HV30(灰虚线) + 极值标记(I/HV>1.3=🔴, <0.85=🟢)<br>
百分位: 60日滚动窗口 &nbsp;|&nbsp; <span class="green">⬆</span> 溢价(IV>HV) &nbsp; <span class="green">⬇</span> 折价(IV<HV)
</div>

<div id="main-chart" class="chart-box"><div id="c-main" class="chart"></div></div>
<div id="sub-chart" class="chart-box"><div id="c-sub" class="chart" style="height:300px"></div></div>
</div>

<script>
fetch('./n_module_data_3y.json').then(r=>r.json()).then(d=>{
    if(!d||!d.length){document.body.innerHTML='<p style="color:red;padding:40px">数据为空</p>';return}
    
    const dates = d.map(v=>v.date);
    const etf = d.map(v=>v.etf);
    const ratio = d.map(v=>v.ratio);
    const pct = d.map(v=>v.pct);
    const iv = d.map(v=>v.iv*100);
    const hv = d.map(v=>v.hv*100);
    
    const etfMin = Math.min(...etf), etfMax = Math.max(...etf);
    const ratioMin = Math.min(...ratio), ratioMax = Math.max(...ratio);
    const last = d[d.length-1];
    
    document.getElementById('days').textContent = d.length;
    document.getElementById('cur-ratio').textContent = last.ratio.toFixed(4);
    document.getElementById('iv-range').textContent = (Math.min(...iv)).toFixed(1)+'% ~ '+(Math.max(...iv)).toFixed(1)+'%';
    document.getElementById('cur-etf').textContent = last.etf.toFixed(3);
    
    // === 极值标记 ===
    const topSignals = [], botSignals = [];
    ratio.forEach((r,i)=>{
        if(r > 1.3) topSignals.push([i, etf[i]]);         // 溢价极端
        if(r < 0.85) botSignals.push([i, etf[i]]);         // 折价极端
    });
    
    // === 百分位着色面积 ===
    const pctColors = pct.map(v => {
        if(v >= 80) return 'rgba(233,69,96,0.3)';
        if(v <= 15) return 'rgba(74,222,128,0.3)';
        return 'rgba(56,189,248,0.08)';
    });
    
    // === 主图 ===
    const chart1 = echarts.init(document.getElementById('c-main'));
    
    const option = {
        tooltip: {
            trigger: 'axis', axisPointer: {type:'cross'},
            backgroundColor: 'rgba(22,33,62,0.95)',
            borderColor: '#333',
            textStyle: {color:'#eee',fontSize:11},
            formatter: function(params) {
                const p = params[0];
                const idx = p.dataIndex;
                const day = d[idx];
                return `<div style="font-weight:700;margin-bottom:4px">${day.date}</div>`+
                    `ETF: <span style="color:#4ade80">${day.etf.toFixed(3)}</span><br>`+
                    `IV/HV比: <span style="color:#38bdf8">${day.ratio.toFixed(4)}</span><br>`+
                    `百分位: <span style="color:#f59e0b">${day.pct}%</span><br>`+
                    `IV: ${(day.iv*100).toFixed(2)}% | HV30: ${(day.hv*100).toFixed(2)}%`;
            }
        },
        dataZoom: [
            {type:'inside',start:0,end:100},
            {type:'slider',bottom:0,height:20,borderColor:'#333',
             fillerColor:'rgba(56,189,248,0.1)',
             textStyle:{color:'#888',fontSize:10},
             labelFormatter:'',dataBackground:{lineStyle:{color:'#555'}}}
        ],
        legend: {
            data: ['ETF收盘','IV/HV百分位','溢价>80%','折价<15%'],
            bottom: 28, textStyle: {color:'#999',fontSize:11},
            icon: 'roundRect', itemWidth: 14, itemHeight: 8
        },
        grid: {left:50,right:20,top:10,bottom:50},
        xAxis: {
            type: 'category', data: dates,
            axisLabel: {color:'#666',fontSize:10,interval: Math.floor(dates.length/30)},
            axisLine: {lineStyle:{color:'#333'}},
            splitLine: {show:false}
        },
        yAxis: [
            {
                type: 'value', name: 'ETF',
                nameTextStyle: {color:'#4ade80',fontSize:10},
                axisLabel: {color:'#4ade80',fontSize:10,formatter:v=>v.toFixed(2)},
                splitLine: {lineStyle:{color:'#222',type:'dashed'}},
                min: Math.floor(etfMin*10)/10 - 0.2,
                max: Math.ceil(etfMax*10)/10 + 0.2
            },
            {
                type: 'value', name: '百分位(%)',
                nameTextStyle: {color:'#f59e0b',fontSize:10},
                axisLabel: {color:'#f59e0b',fontSize:10,formatter:'{value}%'},
                min: 0, max: 105,
                splitLine: {show:false}
            }
        ],
        series: [
            {
                name: 'ETF收盘',
                type: 'line',
                data: etf, yAxisIndex: 0,
                smooth: true,
                lineStyle: {width:2,color:'#4ade80'},
                itemStyle: {color:'#4ade80'},
                symbol: 'none', z: 10
            },
            {
                name: 'IV/HV百分位',
                type: 'line',
                data: pct, yAxisIndex: 1,
                smooth: true,
                lineStyle: {width:2,color:'#f59e0b'},
                itemStyle: {color:'#f59e0b'},
                symbol: 'none',
                areaStyle: {color: {type:'linear',x:0,y:0,x2:0,y2:1,
                    colorStops:[{offset:0,color:'rgba(245,158,11,0.3)'},
                               {offset:0.5,color:'rgba(245,158,11,0.08)'},
                               {offset:1,color:'rgba(245,158,11,0)'}]}},
                z: 5
            },
            {
                name: '溢价>80%',
                type: 'scatter',
                data: topSignals, yAxisIndex: 0,
                symbol: 'triangle', symbolSize: 10,
                itemStyle: {color:'#ef4444'},
                z: 20
            },
            {
                name: '折价<15%',
                type: 'scatter',
                data: botSignals, yAxisIndex: 0,
                symbol: 'diamond', symbolSize: 10,
                itemStyle: {color:'#4ade80'},
                z: 20
            }
        ]
    };
    
    chart1.setOption(option);
    window.addEventListener('resize', ()=>chart1.resize());
    
    // === 副图：IV/HV比柱状+IV+HV ===
    const chart2 = echarts.init(document.getElementById('c-sub'));
    
    const barColors = ratio.map(v => {
        if(v > 1.15) return 'rgba(239,68,68,0.6)';
        if(v < 0.85) return 'rgba(52,211,153,0.6)';
        return 'rgba(56,189,248,0.3)';
    });
    
    const option2 = {
        tooltip: {
            trigger: 'axis', axisPointer: {type:'cross'},
            backgroundColor: 'rgba(22,33,62,0.95)',
            borderColor: '#333',
            textStyle: {color:'#eee',fontSize:11},
            formatter: function(params) {
                const idx = params[0].dataIndex;
                const day = d[idx];
                let html = `<div style="font-weight:700;margin-bottom:4px">${day.date}</div>`;
                html += `IV/HV比: <span style="color:#38bdf8">${day.ratio.toFixed(4)}</span><br>`;
                html += `百分位: <span style="color:#f59e0b">${day.pct}%</span><br>`;
                html += `IV: <span style="color:#ef4444">${(day.iv*100).toFixed(2)}%</span><br>`;
                html += `HV30: <span style="color:#9ca3af">${(day.hv*100).toFixed(2)}%</span>`;
                return html;
            }
        },
        dataZoom: [
            {type:'inside',start:0,end:100},
            {type:'slider',bottom:0,height:20,borderColor:'#333',
             fillerColor:'rgba(56,189,248,0.1)',
             textStyle:{color:'#888',fontSize:10}}
        ],
        legend: {
            data: ['IV/HV比','IV','HV30'],
            bottom: 28, textStyle: {color:'#999',fontSize:11},
            icon: 'roundRect', itemWidth: 14, itemHeight: 8
        },
        grid: {left:50,right:20,top:10,bottom:50},
        xAxis: {
            type: 'category', data: dates,
            axisLabel: {color:'#666',fontSize:10,interval: Math.floor(dates.length/30)},
            axisLine: {lineStyle:{color:'#333'}},
            splitLine: {show:false}
        },
        yAxis: [
            {
                type: 'value', name: 'IV/HV比',
                nameTextStyle: {color:'#38bdf8',fontSize:10},
                axisLabel: {color:'#38bdf8',fontSize:10,formatter:v=>v.toFixed(2)},
                splitLine: {lineStyle:{color:'#222',type:'dashed'}},
                min: Math.max(ratioMin - 0.3, 0),
                max: ratioMax + 0.3
            },
            {
                type: 'value', name: '波动率(%)',
                nameTextStyle: {color:'#ef4444',fontSize:10},
                axisLabel: {color:'#ef4444',fontSize:10,formatter:'{value}%'},
                min: 0, max: 50,
                splitLine: {show:false}
            }
        ],
        series: [
            {
                name: 'IV/HV比',
                type: 'bar',
                data: ratio, yAxisIndex: 0,
                itemStyle: {color: params => barColors[params.dataIndex], borderRadius:[1,1,0,0]},
                z: 10
            },
            {
                name: 'IV',
                type: 'line',
                data: iv, yAxisIndex: 1,
                smooth: true,
                lineStyle: {width:2,color:'rgba(239,68,68,0.7)'},
                itemStyle: {color:'#ef4444'},
                symbol: 'none', z: 8
            },
            {
                name: 'HV30',
                type: 'line',
                data: hv, yAxisIndex: 1,
                smooth: true,
                lineStyle: {width:1.5,color:'rgba(156,163,175,0.5)',type:'dashed'},
                itemStyle: {color:'#9ca3af'},
                symbol: 'none', z: 5
            }
        ]
    };
    
    chart2.setOption(option2);
    window.addEventListener('resize', ()=>chart2.resize());
    
}).catch(e=>{
    document.body.innerHTML = '<p style="color:red;padding:40px">加载失败: '+e.message+'</p>';
    console.error(e);
});
</script>
</body></html>
